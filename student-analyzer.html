<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        h1 { color: #2c3e50; margin-bottom: 25px; }
        input { width: calc(100% - 20px); padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        .btn-container { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; color: white; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.3s; }
        .btn-save { background-color: #27ae60; }
        .btn-save:hover { background-color: #219150; }
        .btn-clear { background-color: #e74c3c; }
        .btn-clear:hover { background-color: #c0392b; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: white; border-radius: 8px; overflow: hidden; }
        th { background-color: #2ecc71; color: white; padding: 15px; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        canvas { margin-top: 30px; max-width: 100%; }
        #topper-display { margin-top: 20px; font-weight: bold; color: #2c3e50; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container">
    <h1>Student Performance Analyzer</h1>
    <input type="text" id="name" placeholder="Enter Student Name">
    <input type="number" id="mark1" placeholder="Subject 1 Marks">
    <input type="number" id="mark2" placeholder="Subject 2 Marks">
    <input type="number" id="mark3" placeholder="Subject 3 Marks">
    
    <div class="btn-container">
        <button class="btn-save" onclick="addStudent()">Save to Backend</button>
        <button class="btn-clear" onclick="clearData()">Clear All Data</button>
    </div>

    <div id="topper-display"></div>

    <table id="studentTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Sub1</th>
                <th>Sub2</th>
                <th>Sub3</th>
                <th>Total</th>
                <th>Average</th>
                <th>Grade</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <canvas id="performanceChart"></canvas>
</div>

<script>
    let studentData = [];
    let myChart;

    // --- FIX: This points to your live Render server ---
    const API_URL = "https://student-performance-analyzer-swetha.onrender.com/result";

    async function addStudent() {
        const name = document.getElementById('name').value;
        const mark1 = parseInt(document.getElementById('mark1').value);
        const mark2 = parseInt(document.getElementById('mark2').value);
        const mark3 = parseInt(document.getElementById('mark3').value);

        if (!name || isNaN(mark1) || isNaN(mark2) || isNaN(mark3)) {
            alert("Please fill all fields correctly!");
            return;
        }

        const payload = { name, mark1, mark2, mark3 };

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (result.message === "Success") {
                alert("✅ Saved to Cloud Database!");
                
                // Add to local list to update UI immediately
                const student = { name, mark1, mark2, mark3, total: result.total, average: result.average, grade: result.grade };
                studentData.push(student);
                
                updateUI();
                clearInputs();
            } else {
                alert("❌ Error: " + result.message);
            }
        } catch (error) {
            console.error("Error:", error);
            alert("❌ Backend not connected! Make sure your Render server is Live.");
        }
    }

    function updateUI() {
        const tbody = document.querySelector("#studentTable tbody");
        tbody.innerHTML = "";
        
        studentData.forEach(s => {
            const row = `<tr>
                <td>${s.name}</td>
                <td>${s.mark1}</td>
                <td>${s.mark2}</td>
                <td>${s.mark3}</td>
                <td>${s.total}</td>
                <td>${s.average}</td>
                <td>${s.grade}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        updateChart();
        findTopper();
    }

    function updateChart() {
        const ctx = document.getElementById('performanceChart').getContext('2d');
        const labels = studentData.map(s => s.name);
        const totals = studentData.map(s => s.total);

        if (myChart) { myChart.destroy(); }

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Total Marks',
                    data: totals,
                    backgroundColor: '#2ecc71'
                }]
            },
            options: { scales: { y: { beginAtZero: true } } }
        });
    }

    function findTopper() {
        if (studentData.length === 0) return;
        const topper = studentData.reduce((prev, current) => (prev.total > current.total) ? prev : current);
        document.getElementById('topper-display').innerHTML = `🌟 Class Topper: ${topper.name} (${topper.total} marks)`;
    }

    function clearInputs() {
        document.getElementById('name').value = '';
        document.getElementById('mark1').value = '';
        document.getElementById('mark2').value = '';
        document.getElementById('mark3').value = '';
    }

    function clearData() {
        studentData = [];
        updateUI();
        document.getElementById('topper-display').innerHTML = "";
    }
</script>

</body>
</html>
